<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOC Dashboard — Centro de Operaciones</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#ffffff;--bg-secondary:#f5f5f4;--bg-tertiary:#eeede8;
  --text-primary:#1a1a18;--text-secondary:#5a5a57;--text-tertiary:#9a9994;
  --border-tertiary:rgba(0,0,0,0.12);--border-secondary:rgba(0,0,0,0.18);--border-primary:rgba(0,0,0,0.28);
  --radius-md:8px;--radius-lg:12px;
  --font-sans:'DM Sans',system-ui,sans-serif;
}
@media(prefers-color-scheme:dark){:root{
  --bg-primary:#1e1e1c;--bg-secondary:#272724;--bg-tertiary:#2e2e2b;
  --text-primary:#f0efe8;--text-secondary:#a8a89e;--text-tertiary:#6a6a62;
  --border-tertiary:rgba(255,255,255,0.1);--border-secondary:rgba(255,255,255,0.16);--border-primary:rgba(255,255,255,0.26);
}}
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap');
body{font-family:var(--font-sans);background:var(--bg-tertiary);color:var(--text-primary);min-height:100vh}
.shell{max-width:1000px;margin:0 auto;padding:24px 16px 48px}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.topbar-title{font-size:16px;font-weight:500;color:var(--text-primary)}
.topbar-sub{font-size:12px;color:var(--text-secondary);margin-top:2px}
.nav{display:flex;gap:3px;background:var(--bg-secondary);padding:3px;border-radius:var(--radius-md);border:0.5px solid var(--border-tertiary)}
.nav-btn{font-size:12px;padding:5px 14px;border-radius:6px;border:none;background:none;color:var(--text-secondary);cursor:pointer;font-family:var(--font-sans);transition:all .15s}
.nav-btn.active{background:var(--bg-primary);color:var(--text-primary);font-weight:500;border:0.5px solid var(--border-secondary)}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:16px}
.kpi{background:var(--bg-secondary);border-radius:var(--radius-md);padding:12px 14px}
.kpi-label{font-size:11px;color:var(--text-secondary);margin-bottom:4px}
.kpi-val{font-size:22px;font-weight:500;color:var(--text-primary);line-height:1}
.kpi-sub{font-size:11px;color:var(--text-tertiary);margin-top:3px}
.section-label{font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--text-tertiary);margin:18px 0 8px 2px}
.tier{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.area-block{flex:1;min-width:180px;border-radius:var(--radius-lg);padding:12px 10px 10px;border:0.5px solid}
/* Colores por área */
.area-block.mon{background:#E1F5EE;border-color:#0F6E56}
.area-block.jef,.area-block.coord{background:#EEEDFE;border-color:#534AB7}
/* Nuevos colores área técnica */
.area-block.sup{background:#FEF3E2;border-color:#B36B00}
.area-block.exp{background:#FEE8D6;border-color:#A0430A}
.area-block.mas{background:#FCE8F3;border-color:#9B1D6A}
.area-block.n1{background:#E8F4FE;border-color:#0A5BA0}
.area-block.n2{background:#E8FEF0;border-color:#0A7A3A}

.area-title{font-size:12px;font-weight:500;margin-bottom:2px}
.area-sub{font-size:11px;margin-bottom:10px}
.area-block.mon .area-title{color:#085041}.area-block.mon .area-sub{color:#0F6E56}
.area-block.jef .area-title,.area-block.coord .area-title{color:#3C3489}
.area-block.jef .area-sub,.area-block.coord .area-sub{color:#534AB7}
.area-block.sup .area-title{color:#7A4800}.area-block.sup .area-sub{color:#B36B00}
.area-block.exp .area-title{color:#6B2B06}.area-block.exp .area-sub{color:#A0430A}
.area-block.mas .area-title{color:#6B1248}.area-block.mas .area-sub{color:#9B1D6A}
.area-block.n1 .area-title{color:#063D70}.area-block.n1 .area-sub{color:#0A5BA0}
.area-block.n2 .area-title{color:#065226}.area-block.n2 .area-sub{color:#0A7A3A}

.person-card{display:flex;align-items:center;gap:8px;background:var(--bg-primary);border-radius:var(--radius-md);padding:7px 9px;margin-bottom:6px;border:0.5px solid var(--border-secondary);cursor:pointer;transition:border-color .15s}
.person-card:hover{border-color:var(--border-primary)}
.person-card:last-child{margin-bottom:0}
.avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:500}
.mon .avatar{background:#9FE1CB;color:#085041}
.jef .avatar,.coord .avatar{background:#CECBF6;color:#3C3489}
.sup .avatar{background:#FDDEA0;color:#7A4800}
.exp .avatar{background:#FBCBAB;color:#6B2B06}
.mas .avatar{background:#F9C5E5;color:#6B1248}
.n1 .avatar{background:#B8DCFC;color:#063D70}
.n2 .avatar{background:#A8F0C6;color:#065226}

.card-info{flex:1;min-width:0}
.card-name{font-size:11px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-style:italic}
.card-role{font-size:12px;font-weight:500;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500;white-space:nowrap;flex-shrink:0}
.badge.asignado{background:#E1F5EE;color:#085041}
.badge.vacio{background:#FCEBEB;color:#A32D2D}
.overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);align-items:flex-start;justify-content:center;padding-top:40px;z-index:100;overflow-y:auto}
.overlay.open{display:flex}
.panel{background:var(--bg-primary);border-radius:var(--radius-lg);padding:20px;width:320px;border:0.5px solid var(--border-secondary);max-height:85vh;overflow-y:auto;margin-bottom:40px}
.panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.panel-title{font-size:14px;font-weight:500;color:var(--text-primary)}
.close-btn{background:none;border:none;cursor:pointer;color:var(--text-secondary);font-size:20px;line-height:1;padding:2px}
.profile-hero{display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg-secondary);border-radius:var(--radius-md);margin-bottom:14px}
.profile-av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:500;flex-shrink:0}
.profile-name{font-size:14px;font-weight:500;color:var(--text-primary)}
.profile-role{font-size:12px;color:var(--text-secondary);margin-top:2px}
.info-row{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:0.5px solid var(--border-tertiary);font-size:12px;gap:8px}
.info-row:last-child{border-bottom:none}
.info-key{color:var(--text-secondary);flex-shrink:0}
.info-val{color:var(--text-primary);font-weight:500;text-align:right}
.field-label{font-size:11px;color:var(--text-secondary);margin-bottom:4px;margin-top:10px}
.field-input,.field-select{width:100%;border:0.5px solid var(--border-secondary);border-radius:var(--radius-md);padding:7px 10px;font-size:13px;color:var(--text-primary);background:var(--bg-secondary);font-family:var(--font-sans)}
.field-input:focus,.field-select:focus{outline:none;border-color:var(--border-primary)}
.btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.btn{padding:6px 14px;border-radius:var(--radius-md);font-size:12px;cursor:pointer;border:0.5px solid var(--border-secondary);background:var(--bg-secondary);color:var(--text-primary);font-family:var(--font-sans)}
.btn.primary{background:#534AB7;color:#EEEDFE;border-color:#534AB7}
.btn.primary:hover{background:#3C3489}
.btn.danger{background:#FCEBEB;color:#A32D2D;border-color:#F7C1C1}
.view-page{display:none}.view-page.active{display:block}
.empty-state{text-align:center;padding:40px 16px;color:var(--text-tertiary);font-size:13px}
.zone-card{background:var(--bg-primary);border:0.5px solid var(--border-secondary);border-radius:var(--radius-lg);padding:14px 16px;flex:1;min-width:160px}
/* Jerarquía técnica badge */
.hier-badge{display:inline-block;font-size:9px;padding:1px 6px;border-radius:8px;margin-left:4px;vertical-align:middle;font-weight:500}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div>
      <div class="topbar-title">NOC — Centro de Operaciones</div>
      <div class="topbar-sub">5,000 escuelas · 3 zonas · El Salvador</div>
    </div>
    <div class="nav">
      <button class="nav-btn active" onclick="showView('overview')">Resumen</button>
      <button class="nav-btn" onclick="showView('org')">Organigrama</button>

  <div id="v-org" class="view-page"></div>
  <div id="v-team" class="view-page"></div>
</div>

<div class="overlay" id="overlay">
  <div class="panel" id="panel-content"></div>
</div>

// ── HELPERS ──────────────────────────────────────────────────────────────
function ini(name,role){const s=name||role;return s.trim().split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function statusBadge(id){
  const p=people[id];
  if(!p.name.trim()||p.name==='Sin Asignar') return '<span class="badge vacio">vacante</span>';
  return '<span class="badge asignado">asignado</span>';
}
function calcStats(){
  const ids=Object.keys(people);
  const total=ids.length;
  const assigned=ids.filter(id=>people[id].name.trim()&&people[id].name!=='Sin Asignar').length;
  const vacant=total-assigned;
  const monIds=ids.filter(id=>people[id].area==='mon');
  const monFilled=monIds.filter(id=>people[id].name.trim()).length;
  const tecIds=ids.filter(id=>['sup','exp','mas','n1','n2'].includes(people[id].area));
  const tecFilled=tecIds.filter(id=>people[id].name.trim()).length;
  return{total,assigned,vacant,monTotal:monIds.length,monFilled,tecTotal:tecIds.length,tecFilled};
}
function renderKPIs(){
  const s=calcStats();
  const pct=Math.round(s.assigned/s.total*100);
  return`<div class="kpi-grid">
    <div class="kpi"><div class="kpi-label">Total puestos</div><div class="kpi-val">${s.total}</div><div class="kpi-sub">en 3 zonas</div></div>
    <div class="kpi"><div class="kpi-label">Asignados</div><div class="kpi-val">${s.assigned}</div><div class="kpi-sub">${pct}% del total</div></div>
    <div class="kpi"><div class="kpi-label">Vacantes</div><div class="kpi-val" style="color:#E24B4A">${s.vacant}</div><div class="kpi-sub">por cubrir</div></div>
    <div class="kpi"><div class="kpi-label">Monitores</div><div class="kpi-val">${s.monFilled}/${s.monTotal}</div><div class="kpi-sub">asignados</div></div>
    <div class="kpi"><div class="kpi-label">Técnicos</div><div class="kpi-val">${s.tecFilled}/${s.tecTotal}</div><div class="kpi-sub">asignados</div></div>
    <div class="kpi"><div class="kpi-label">Escuelas</div><div class="kpi-val">5,000</div><div class="kpi-sub">bajo monitoreo</div></div>
  </div>`;
}
function renderZoneCard(zone){
  const ids=Object.keys(people).filter(id=>people[id].zone===zone);
  const total=ids.length;
  const assigned=ids.filter(id=>people[id].name.trim()&&people[id].name!=='Sin Asignar').length;
  const vacant=total-assigned;
  const pct=Math.round(assigned/total*100);
  const barColor=pct===100?'#1D9E75':pct>=60?'#EF9F27':'#E24B4A';
  return`<div class="zone-card">
    <div style="font-size:13px;font-weight:500;color:var(--text-primary);margin-bottom:2px">${zone}</div>
    <div style="font-size:11px;color:var(--text-secondary);margin-bottom:10px">${ZONE_SCHOOLS[zone].toLocaleString()} escuelas</div>
    <div style="display:flex;gap:14px;margin-bottom:10px">
      <div><div style="font-size:10px;color:var(--text-tertiary)">Asignados</div><div style="font-size:18px;font-weight:500">${assigned}</div></div>
      <div><div style="font-size:10px;color:var(--text-tertiary)">Vacantes</div><div style="font-size:18px;font-weight:500;color:#E24B4A">${vacant}</div></div>
      <div><div style="font-size:10px;color:var(--text-tertiary)">Cobertura</div><div style="font-size:18px;font-weight:500">${pct}%</div></div>
    </div>
    <div style="height:4px;background:var(--bg-secondary);border-radius:2px;overflow:hidden">
      <div style="height:100%;width:${pct}%;background:${barColor};border-radius:2px"></div>
    </div>
  </div>`;
}
function renderVacantList(){
  const vacant=Object.values(people).filter(p=>!p.name.trim()||p.name==='Sin Asignar');
  if(!vacant.length) return'<div class="empty-state">✓ Todos los puestos cubiertos</div>';
  return vacant.map(p=>`<div class="person-card" onclick="openProfile('${p.id}')">
    <div class="avatar" style="background:var(--bg-secondary);color:var(--text-secondary)">?</div>
    <div class="card-info"><div class="card-role">${p.role}</div><div class="card-name">${p.zone} · vacante</div></div>
    <span class="badge vacio">vacante</span>
  </div>`).join('');
}
function renderOverview(){
  return renderKPIs()+`
  <div class="section-label">cobertura por zona</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">${ZONES.map(renderZoneCard).join('')}</div>
  <div class="section-label">puestos vacantes</div>
  ${renderVacantList()}`;
}

// ── ORGANIGRAMA ────────────────────────────────────────────────────────
const orgStructure=[

  {label:'Expertos en Conectividad — por zona (nivel táctico)',areas:[
    {cls:'exp',title:'Experto Occidente',sub:'Coordinación técnica de zona',slots:['exo']},
    {cls:'exp',title:'Experto Centro',sub:'Coordinación técnica de zona',slots:['exc']},
    {cls:'exp',title:'Experto Oriente',sub:'Coordinación técnica de zona',slots:['exr']}
  ]},
  {label:'Técnicos Master — por zona (liderazgo operativo)',areas:[
    {cls:'mas',title:'Master Occidente',sub:'Contingencias · Configuraciones',slots:['mao']},
    {cls:'mas',title:'Master Centro',sub:'Contingencias · Configuraciones',slots:['mac']},
    {cls:'mas',title:'Master Oriente',sub:'Contingencias · Configuraciones',slots:['mar']}
  ]},
  {label:'Técnicos N1 — soporte remoto avanzado',areas:[
    {cls:'n1',title:'N1 Occidente',sub:'Config. Huawei · Diagnóstico remoto',slots:['n1o1','n1o2']},
    {cls:'n1',title:'N1 Centro',sub:'Config. Huawei · Diagnóstico remoto',slots:['n1c1','n1c2']},
    {cls:'n1',title:'N1 Oriente',sub:'Config. Huawei · Diagnóstico remoto',slots:['n1r1','n1r2']}
  ]},
  {label:'Técnicos N2 de Campo — intervención física',areas:[
    {cls:'n2',title:'N2 Campo Occidente',sub:'Instalación · Mantenimiento',slots:['n2o1','n2o2']},
    {cls:'n2',title:'N2 Campo Centro',sub:'Instalación · Mantenimiento',slots:['n2c1','n2c2']},
    {cls:'n2',title:'N2 Campo Oriente',sub:'Instalación · Mantenimiento',slots:['n2r1','n2r2']}
  ]}
];

let editMode=false;

function renderCard(id,sIdx,aIdx){
  const p=people[id];
  const delBtn=editMode?`<button onclick="event.stopPropagation();deletePerson('${id}',${sIdx},${aIdx})" style="background:#FCEBEB;border:none;border-radius:6px;color:#A32D2D;font-size:11px;padding:2px 7px;cursor:pointer;flex-shrink:0">✕</button>`:'';
  return`<div class="person-card" onclick="openProfile('${id}')" style="${editMode?'border-color:#534AB7':''}">
    <div class="avatar">${ini(p.name,p.role)}</div>
    <div class="card-info">
      <div class="card-role">${p.role}</div>
      ${p.name&&p.name!=='Sin Asignar'?`<div class="card-name">${p.name}</div>`:`<div class="card-name" style="color:#E24B4A;font-style:normal">— vacante</div>`}
    </div>
    ${editMode?delBtn:statusBadge(id)}
  </div>`;
}

function renderOrg(){
  const editBar=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding:10px 14px;background:${editMode?'#EEEDFE':'var(--bg-secondary)'};border-radius:var(--radius-md);border:0.5px solid ${editMode?'#534AB7':'var(--border-tertiary)'}">
    <span style="font-size:12px;color:${editMode?'#3C3489':'var(--text-secondary)'};font-weight:500">${editMode?'✏️ Modo edición activo — haz clic en ✕ para eliminar':'Estructura del organigrama'}</span>
    <div style="display:flex;gap:6px">
      ${editMode?`<button onclick="openAddSection()" class="btn primary" style="font-size:11px;padding:4px 12px">+ Sección</button>`:''}
      <button onclick="editMode=!editMode;renderView('org')" class="btn ${editMode?'danger':'primary'}" style="font-size:11px;padding:4px 12px">${editMode?'Salir':'Editar estructura'}</button>
    </div>
  </div>`;

  const sections=orgStructure.map((s,sIdx)=>{
    const delSecBtn=editMode?`<button onclick="deleteSection(${sIdx})" style="background:#FCEBEB;border:none;border-radius:6px;color:#A32D2D;font-size:10px;padding:2px 8px;cursor:pointer;margin-left:8px">✕ sección</button>`:'';
    const areas=s.areas.map((a,aIdx)=>{
      const addSlotBtn=editMode?`<button onclick="addSlot(${sIdx},${aIdx})" style="width:100%;margin-top:6px;background:none;border:1px dashed var(--border-secondary);border-radius:var(--radius-md);color:var(--text-tertiary);font-size:11px;padding:6px;cursor:pointer">+ puesto</button>`:'';
      const delBlockBtn=editMode?`<button onclick="deleteBlock(${sIdx},${aIdx})" style="float:right;background:#FCEBEB;border:none;border-radius:6px;color:#A32D2D;font-size:10px;padding:1px 7px;cursor:pointer">✕</button>`:'';
      return`<div class="area-block ${a.cls}">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2px">
          <div class="area-title">${a.title}</div>${delBlockBtn}
        </div>
        <div class="area-sub">${a.sub}</div>
        ${a.slots.map(id=>renderCard(id,sIdx,aIdx)).join('')}
        ${addSlotBtn}
      </div>`;
    }).join('');
    const addBlockBtn=editMode?`<div style="flex:1;min-width:180px;display:flex;align-items:center;justify-content:center"><button onclick="openAddBlock(${sIdx})" style="background:none;border:1px dashed var(--border-secondary);border-radius:var(--radius-lg);color:var(--text-tertiary);font-size:11px;padding:14px 20px;cursor:pointer;width:100%">+ bloque</button></div>`:'';
    return`<div class="section-label" style="display:flex;align-items:center">${s.label}${delSecBtn}</div><div class="tier">${areas}${addBlockBtn}</div>`;
  }).join('');

  return editBar+sections;
}

// ── EDICIÓN ESTRUCTURAL ──────────────────────────────────────────────
function deleteSection(sIdx){
  if(!confirm('¿Eliminar esta sección completa y todos sus puestos?')) return;
  const s=orgStructure[sIdx];
  s.areas.forEach(a=>a.slots.forEach(id=>delete people[id]));
  orgStructure.splice(sIdx,1);
  renderView('org');
}
function deleteBlock(sIdx,aIdx){
  if(!confirm('¿Eliminar este bloque y todos sus puestos?')) return;
  const a=orgStructure[sIdx].areas[aIdx];
  a.slots.forEach(id=>delete people[id]);
  orgStructure[sIdx].areas.splice(aIdx,1);
  if(orgStructure[sIdx].areas.length===0) orgStructure.splice(sIdx,1);
  renderView('org');
}
function deletePerson(id,sIdx,aIdx){
  if(!confirm('¿Eliminar este puesto?')) return;
  delete people[id];
  orgStructure[sIdx].areas[aIdx].slots=orgStructure[sIdx].areas[aIdx].slots.filter(s=>s!==id);
  renderView('org');
}
function addSlot(sIdx,aIdx){
  const a=orgStructure[sIdx].areas[aIdx];
  const id='slot_'+Date.now();
  people[id]={id,role:'Nuevo puesto',name:'',area:a.cls,zone:'—',email:'',phone:'',notes:''};
  a.slots.push(id);
  renderView('org');
  setTimeout(()=>openProfile(id),50);
}

function openAddBlock(sIdx){
  const s=orgStructure[sIdx];
  const clsOpts=['jef','coord','mon','sup','exp','mas','n1','n2'].map(c=>`<option value="${c}">${c}</option>`).join('');
  document.getElementById('panel-content').innerHTML=`
    <div class="panel-header"><span class="panel-title">Agregar bloque</span><button class="close-btn" onclick="closeOverlay()">×</button></div>
    <div class="field-label">Título del bloque</div><input class="field-input" id="ab-title" placeholder="Ej. Técnicos Sur">
    <div class="field-label">Subtítulo</div><input class="field-input" id="ab-sub" placeholder="Ej. ≈500 escuelas">
    <div class="field-label">Color (área)</div>
    <select class="field-select" id="ab-cls">${clsOpts}</select>
    <div class="btn-row">
      <button class="btn" onclick="closeOverlay()">Cancelar</button>
      <button class="btn primary" onclick="saveAddBlock(${sIdx})">Agregar</button>
    </div>`;
  document.getElementById('overlay').classList.add('open');
}
function saveAddBlock(sIdx){
  const title=document.getElementById('ab-title').value.trim()||'Nuevo bloque';
  const sub=document.getElementById('ab-sub').value.trim();
  const cls=document.getElementById('ab-cls').value;
  orgStructure[sIdx].areas.push({cls,title,sub,slots:[]});
  closeOverlay();renderView('org');
}

function openAddSection(){
  document.getElementById('panel-content').innerHTML=`
    <div class="panel-header"><span class="panel-title">Agregar sección</span><button class="close-btn" onclick="closeOverlay()">×</button></div>
    <div class="field-label">Nombre de la sección</div><input class="field-input" id="as-label" placeholder="Ej. Área de Soporte">
    <div class="btn-row">
      <button class="btn" onclick="closeOverlay()">Cancelar</button>
      <button class="btn primary" onclick="saveAddSection()">Agregar</button>
    </div>`;
  document.getElementById('overlay').classList.add('open');
}
function saveAddSection(){
  const label=document.getElementById('as-label').value.trim()||'Nueva sección';
  orgStructure.push({label,areas:[]});
  closeOverlay();renderView('org');
}

// ── EQUIPO ────────────────────────────────────────────────────────────
let teamFilter='all',teamSearch='';
function renderTeam(){
  const filtered=Object.values(people).filter(p=>{
    if(teamFilter==='vacant') return!p.name.trim()||p.name==='Sin Asignar';
    if(teamFilter==='mon') return p.area==='mon';
    if(teamFilter==='tec') return['sup','exp','mas','n1','n2'].includes(p.area);
    if(teamFilter==='coord') return p.area==='coord'||p.area==='jef';
    return true;
  }).filter(p=>{
    if(!teamSearch) return true;
    const q=teamSearch.toLowerCase();
    return p.name.toLowerCase().includes(q)||p.role.toLowerCase().includes(q)||p.zone.toLowerCase().includes(q);
  });
  const pills=[{k:'all',l:'Todos'},{k:'coord',l:'Coordinación'},{k:'mon',l:'Monitoreo'},{k:'tec',l:'Técnico'},{k:'vacant',l:'Vacantes'}];
  return`<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px">
    <input class="field-input" style="flex:1;min-width:160px;max-width:220px" placeholder="Buscar nombre, cargo, zona..." oninput="teamSearch=this.value;renderView('team')" value="${teamSearch}">
    <div style="display:flex;gap:4px;flex-wrap:wrap">${pills.map(p=>`<button onclick="teamFilter='${p.k}';renderView('team')" style="font-size:11px;padding:4px 10px;border-radius:10px;border:0.5px solid;cursor:pointer;font-family:var(--font-sans);${teamFilter===p.k?'background:#534AB7;color:#EEEDFE;border-color:#534AB7':'background:var(--bg-secondary);color:var(--text-secondary);border-color:var(--border-secondary)'}">${p.l}</button>`).join('')}</div>
  </div>
  ${filtered.length===0?'<div class="empty-state">Sin resultados</div>':`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:6px">${filtered.map(p=>`<div class="person-card" onclick="openProfile('${p.id}')"><div class="avatar ${p.area}">${ini(p.name,p.role)}</div><div class="card-info"><div class="card-role">${p.role}</div>${p.name&&p.name!=='Sin Asignar'?`<div class="card-name">${p.name} · ${p.zone}</div>`:`<div class="card-name" style="color:#E24B4A;font-style:normal">${p.zone} · vacante</div>`}</div>${statusBadge(p.id)}</div>`).join('')}</div>`}`;
}

// ── PERFIL / EDICIÓN ────────────────────────────────────────────────
let currentView='overview';
function showView(v){
  currentView=v;
  document.querySelectorAll('.nav-btn').forEach((b,i)=>{
    const map={0:'overview',1:'org',2:'team'};
    b.classList.toggle('active',map[i]===v);
  });
  renderView(v);
}
function renderView(v){
  document.querySelectorAll('.view-page').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById('v-'+v);
  if(el){el.classList.add('active');el.innerHTML=v==='overview'?renderOverview():v==='org'?renderOrg():renderTeam();}
}
function areaLabel(a){
  return{jef:'Jefatura',coord:'Coordinación',mon:'Monitoreo',sup:'Supervisor de Zona',exp:'Experto en Conectividad',mas:'Técnico Master',n1:'Técnico N1',n2:'Técnico N2 de Campo'}[a]||a;
}
function avcol(area){
  return{
    mon:'background:#9FE1CB;color:#085041',
    jef:'background:#CECBF6;color:#3C3489',
    coord:'background:#CECBF6;color:#3C3489',
    sup:'background:#FDDEA0;color:#7A4800',
    exp:'background:#FBCBAB;color:#6B2B06',
    mas:'background:#F9C5E5;color:#6B1248',
    n1:'background:#B8DCFC;color:#063D70',
    n2:'background:#A8F0C6;color:#065226',
  }[area]||'background:var(--bg-secondary);color:var(--text-secondary)';
}
function openProfile(id){
  const p=people[id];
  const av=ini(p.name,p.role);
  const zoneOpts=['—','Occidente','Centro','Oriente'].map(z=>`<option${p.zone===z?' selected':''}>${z}</option>`).join('');
  document.getElementById('panel-content').innerHTML=`
    <div class="panel-header">
      <span class="panel-title">Perfil de puesto</span>
      <button class="close-btn" onclick="closeOverlay()">×</button>
    </div>
    <div class="profile-hero">
      <div class="profile-av" style="${avcol(p.area)}">${av}</div>
      <div><div class="profile-name">${p.name||'— Sin asignar'}</div><div class="profile-role">${p.role} · ${p.zone}</div></div>
    </div>
    <div>${[['Área',areaLabel(p.area)],['Zona',p.zone],['Estado',p.name&&p.name!=='Sin Asignar'?'Asignado':'Vacante'],['Email',p.email||'—'],['Teléfono',p.phone||'—'],['Notas',p.notes||'—']].map(([k,v])=>`<div class="info-row"><span class="info-key">${k}</span><span class="info-val">${v}</span></div>`).join('')}</div>
    <div style="height:1px;background:var(--border-tertiary);margin:12px 0 4px"></div>
    <div style="font-size:11px;color:var(--text-secondary);margin-bottom:8px;font-weight:500">EDITAR PUESTO</div>
    <div class="field-label">Nombre</div><input class="field-input" id="ed-name" value="${p.name}" placeholder="Nombre completo">
    <div class="field-label">Cargo</div><input class="field-input" id="ed-role" value="${p.role}" placeholder="Ej. Técnico Master, Supervisor de Zona...">
    <div class="field-label">Zona</div><select class="field-select" id="ed-zone">${zoneOpts}</select>
    <div class="field-label">Email</div><input class="field-input" id="ed-email" value="${p.email}" placeholder="correo@ejemplo.com">
    <div class="field-label">Teléfono</div><input class="field-input" id="ed-phone" value="${p.phone}" placeholder="+503 0000-0000">
    <div class="field-label">Notas</div><input class="field-input" id="ed-notes" value="${p.notes}" placeholder="Observaciones...">
    <div class="btn-row">
      <button class="btn danger" onclick="clearPerson('${id}')">Vaciar</button>
      <button class="btn" onclick="closeOverlay()">Cancelar</button>
      <button class="btn primary" onclick="savePerson('${id}')">Guardar</button>
    </div>`;
  document.getElementById('overlay').classList.add('open');
}
function clearPerson(id){people[id].name='';people[id].email='';people[id].phone='';people[id].notes='';closeOverlay();renderView(currentView);}
function savePerson(id){
  people[id].name=document.getElementById('ed-name').value.trim();
  people[id].role=document.getElementById('ed-role').value;
  people[id].zone=document.getElementById('ed-zone').value;
  people[id].email=document.getElementById('ed-email').value.trim();
  people[id].phone=document.getElementById('ed-phone').value.trim();
  people[id].notes=document.getElementById('ed-notes').value.trim();
  closeOverlay();renderView(currentView);
}
function closeOverlay(){document.getElementById('overlay').classList.remove('open');}
document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeOverlay();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeOverlay();});
renderView('overview');
</script>
</body>
</html>
